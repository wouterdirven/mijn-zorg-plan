<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mijn Zorgplan</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Mijn Zorgplan</h1>
      <p>Beantwoord een paar korte vragen en ontvang een persoonlijk stappenplan met duidelijke volgende acties.</p>
    </section>

    <section class="card" id="questionBox">
      <div class="progress">
        <span id="progressText">Vraag 1 van 4</span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <h2 class="question-title" id="questionTitle"></h2>
      <div class="options" id="options"></div>
    </section>

    <section class="card result-section" id="resultSection">
      <div class="result-header">
        <h2 id="resultTitle">Jouw persoonlijke stappenplan</h2>
        <p id="resultSubtitle"></p>
      </div>
      <div id="planBody"></div>
      <div class="actions">
        <button class="primary" id="restartButton">Opnieuw beginnen</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
