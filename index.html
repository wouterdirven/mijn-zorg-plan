<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mijn Zorgplan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Mijn Zorgplan</h1>
      <p>Beantwoord een paar korte vragen en we zoeken de juiste hulp voor jouw situatie.</p>
    </section>

    <div class="crisis-banner" id="crisisBanner"></div>

    <section class="card" id="questionBox">
      <div class="progress">
        <span id="progressText">Vraag 1</span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <h2 class="question-title" id="questionTitle"></h2>
      <div class="options" id="options"></div>
    </section>

    <section class="card result-section" id="resultSection">
      <div class="result-header">
        <h2 id="resultTitle"></h2>
        <p id="resultSubtitle"></p>
      </div>
      <div id="planBody"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
